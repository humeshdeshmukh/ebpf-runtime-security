apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: payment-gateway-egress-rules
  namespace: default
spec:
  endpointSelector:
    matchLabels:
      app: payment-gateway
  egress:
  # Allow egress to DNS (kube-dns) in kube-system namespace
  - toEndpoints:
    - matchLabels:
        "k8s:io.kubernetes.pod.namespace": kube-system
        "k8s:k8s-app": kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      rules:
        dns:
        - matchPattern: "*"
  # Allow egress to authorized external APIs (e.g. api.stripe.com for payments)
  - toFQDNs:
    - matchName: "api.stripe.com"
    - matchName: "stripe.com"
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
